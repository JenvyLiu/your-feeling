<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Your Feeling - 匿名分享你的心声">
  <meta name="keywords" content="匿名分享,心情,吐槽,情感社区">
  <meta name="author" content="Your Feeling">
  <meta name="theme-color" content="#0f0c29">
  <meta name="robots" content="index, follow">

  <!-- Open Graph / 社交分享卡片 -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Your Feeling - 匿名分享你的心声">
  <meta property="og:description" content="一个匿名分享心情与想法的温暖社区，让每一份心事都被看见。">
  <meta property="og:site_name" content="Your Feeling">
  <meta property="og:locale" content="zh_CN">

  <!-- Twitter 卡片 -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Your Feeling - 匿名分享你的心声">
  <meta name="twitter:description" content="一个匿名分享心情与想法的温暖社区">

  <title>Your Feeling - 匿名分享你的心声</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/vendor/font-awesome/css/font-awesome.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <!-- Toast 通知容器 -->
  <div id="toast" class="toast-container" role="status" aria-live="polite" aria-atomic="true"></div>

  <!-- 图片灯箱 -->
  <div id="lightbox" class="lightbox" onclick="closeLightbox()" role="dialog" aria-modal="true" aria-label="图片预览">
    <img id="lightbox-img" src="" alt="预览图片">
  </div>

  <!-- 举报模态框 -->
  <div id="report-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-label="举报内容">
    <div class="modal-content" style="max-width: 420px;">
      <div class="modal-header">
        <span class="modal-title"><i class="fa fa-flag" style="color: var(--danger); margin-right: 8px;" aria-hidden="true"></i>举报内容</span>
        <button class="modal-close" onclick="closeReportModal()" aria-label="关闭"><i class="fa fa-times" aria-hidden="true"></i></button>
      </div>
      <div id="report-reasons" style="margin-bottom: 16px;">
        <p class="text-sm text-muted text-center py-4"><i class="fa fa-spinner fa-spin"></i> 加载中...</p>
      </div>
      <button id="report-submit-btn" class="btn-primary" style="width: 100%;" onclick="submitReport()">
        <i class="fa fa-paper-plane"></i> 提交举报
      </button>
    </div>
  </div>

  <!-- 顶部导航栏 -->
  <nav class="navbar">
    <div class="navbar-inner">
      <span class="navbar-title"><i class="fa fa-heart"></i> Your Feeling</span>
      <div class="navbar-controls">
        <input type="text" id="search-input" class="nav-input" placeholder="搜索..." aria-label="搜索帖子" oninput="handleSearch()">
        <select id="sort-select" class="nav-select" onchange="handleSortChange()">
          <option value="latest">最新</option>
          <option value="hot">热门</option>
          <option value="comments">评论</option>
        </select>
        <select id="mood-filter" class="nav-select" onchange="handleMoodFilter()">
          <option value="">全部情绪</option>
          <option value="happy">😊 开心</option>
          <option value="sad">😢 难过</option>
          <option value="angry">😠 生气</option>
          <option value="anxious">😰 焦虑</option>
          <option value="calm">😌 平静</option>
          <option value="confused">🤔 困惑</option>
          <option value="grateful">💖 感恩</option>
          <option value="tired">😫 疲惫</option>
          <option value="excited">🤩 兴奋</option>
        </select>
        <button class="nav-btn" id="bookmarks-btn" onclick="toggleBookmarksView()" aria-label="我的收藏" title="我的收藏"><i class="fa fa-bookmark" aria-hidden="true"></i></button>
        <button class="nav-btn" id="admin-btn" onclick="openAdminModal()" aria-label="管理面板" title="管理面板"><i class="fa fa-shield" aria-hidden="true"></i></button>
        <button class="theme-toggle" onclick="toggleTheme()" aria-label="切换深色/浅色主题" title="切换主题"><i class="fa fa-moon-o" id="theme-icon" aria-hidden="true"></i></button>
      </div>
    </div>
  </nav>

  <!-- 主内容区 -->
  <div class="main-container">

    <!-- 每日一句推荐区 -->
    <div id="featured-section" class="featured-section" style="display: none;">
      <div class="featured-label"><i class="fa fa-star"></i> 每日一句</div>
      <div class="featured-content" id="featured-content"></div>
    </div>

    <!-- 帖子容器 -->
    <div id="posts-container"></div>

    <!-- 加载更多指示器 -->
    <div id="load-more-indicator" class="load-more-indicator" style="display: none;">
      <i class="fa fa-spinner fa-spin"></i> 加载中...
    </div>

    <!-- 空状态 -->
    <div id="empty-state" class="empty-state" style="display: none;">
      <i class="fa fa-cloud"></i>
      <p>还没有人发布内容，来做第一个吧！</p>
    </div>

    <!-- 无搜索结果 -->
    <div id="no-results" class="no-results" style="display: none;">
      <i class="fa fa-search"></i>
      <p>没有找到相关内容</p>
    </div>

    <!-- 收藏视图容器 -->
    <div id="bookmarks-container" style="display: none;"></div>

    <!-- 热门标签区 -->
    <div id="popular-tags-section" class="popular-tags-section" style="display: none;">
      <div class="tags-title"><i class="fa fa-fire"></i> 热门标签</div>
      <div id="popular-tags-list"></div>
    </div>

  </div>

  <!-- 浮动分享/发布按钮 -->
  <button class="fab-share" onclick="openShareModal()" aria-label="发布新内容" title="发布新内容">
    <i class="fa fa-plus" aria-hidden="true"></i>
  </button>

  <!-- 回到顶部按钮 -->
  <button id="scroll-top-btn" class="scroll-top-btn" onclick="scrollToTop()" aria-label="回到顶部" title="回到顶部">
    <i class="fa fa-chevron-up" aria-hidden="true"></i>
  </button>

  <!-- 分享模态框 -->
  <div id="share-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-label="发布心声">
    <div class="modal-content">
      <div class="modal-header">
        <span class="modal-title"><i class="fa fa-edit" style="color: var(--accent-purple); margin-right: 8px;" aria-hidden="true"></i>发布心声</span>
        <button class="modal-close" onclick="closeShareModal()" aria-label="关闭"><i class="fa fa-times" aria-hidden="true"></i></button>
      </div>
      <form id="share-form" onsubmit="return false;">
        <div id="content-wrapper" class="form-group" style="position: relative;">
          <textarea id="post-content" class="form-textarea" placeholder="此刻你在想什么..." aria-label="发布心声" oninput="updateCharCount()"></textarea>
          <span id="char-count" class="char-count absolute bottom-3 right-3">0 字</span>
        </div>

        <!-- 心情选择 -->
        <div class="form-group">
          <label class="form-label">选择心情</label>
          <input type="hidden" id="selected-mood" value="">
          <div class="mood-options">
            <div class="mood-option" data-mood="happy" onclick="selectMood('happy')"><i class="fa fa-smile-o"></i> 开心</div>
            <div class="mood-option" data-mood="sad" onclick="selectMood('sad')"><i class="fa fa-frown-o"></i> 难过</div>
            <div class="mood-option" data-mood="angry" onclick="selectMood('angry')"><i class="fa fa-angry"></i> 生气</div>
            <div class="mood-option" data-mood="anxious" onclick="selectMood('anxious')"><i class="fa fa-meh-o"></i> 焦虑</div>
            <div class="mood-option" data-mood="calm" onclick="selectMood('calm')"><i class="fa fa-smile-o"></i> 平静</div>
            <div class="mood-option" data-mood="love" onclick="selectMood('love')"><i class="fa fa-heart"></i> 恋爱</div>
            <div class="mood-option" data-mood="tired" onclick="selectMood('tired')"><i class="fa fa-tired"></i> 疲惫</div>
            <div class="mood-option" data-mood="excited" onclick="selectMood('excited')"><i class="fa fa-bolt"></i> 兴奋</div>
          </div>
        </div>

        <!-- 有效期选择 -->
        <div class="form-group">
          <label class="form-label">有效期</label>
          <input type="hidden" id="selected-expiry" value="">
          <div class="expiry-options">
            <div class="expiry-option selected" data-expiry="" onclick="selectExpiry('')">永久</div>
            <div class="expiry-option" data-expiry="1" onclick="selectExpiry('1')">1小时</div>
            <div class="expiry-option" data-expiry="6" onclick="selectExpiry('6')">6小时</div>
            <div class="expiry-option" data-expiry="24" onclick="selectExpiry('24')">1天</div>
            <div class="expiry-option" data-expiry="72" onclick="selectExpiry('72')">3天</div>
            <div class="expiry-option" data-expiry="168" onclick="selectExpiry('168')">7天</div>
          </div>
        </div>

        <!-- 工具栏 -->
        <div class="toolbar-btns">
          <button type="button" class="btn-secondary" onclick="document.getElementById('post-image').click()">
            <i class="fa fa-image"></i> 图片
          </button>
          <button type="button" class="btn-secondary" onclick="toggleLinkInput()">
            <i class="fa fa-link"></i> 链接
          </button>
        </div>
        <input type="file" id="post-image" accept="image/*" style="display:none">

        <!-- 图片预览 -->
        <div id="image-preview" class="image-preview" style="display: none;">
          <img id="preview-img" src="" alt="图片预览">
          <button type="button" class="remove-btn" onclick="removeImage()" aria-label="移除图片"><i class="fa fa-times" aria-hidden="true"></i></button>
        </div>

        <!-- 链接输入 -->
        <div class="form-group" style="margin-top: 12px;">
          <input type="url" id="post-link" class="form-input" placeholder="粘贴链接地址..." aria-label="帖子链接" style="display: none;">
        </div>

        <!-- 标签输入 -->
        <div class="form-group">
          <input type="text" id="post-tags" class="form-input" placeholder="添加标签（逗号分隔，最多5个）" aria-label="帖子标签">
          <div id="tags-preview" style="margin-top: 8px;"></div>
        </div>

        <!-- 提交按钮 -->
        <button type="submit" id="submit-btn" class="btn-primary" style="width: 100%;">
          <i class="fa fa-paper-plane"></i><span>发布</span>
        </button>
      </form>
    </div>
  </div>

  <!-- 管理面板模态框 -->
  <div id="admin-modal" class="modal-overlay" style="align-items: stretch; padding: 0;" role="dialog" aria-modal="true" aria-label="管理面板">
    <div class="admin-panel">
      <!-- 顶部导航栏 -->
      <div class="admin-topbar">
        <div class="admin-topbar-left">
          <i class="fa fa-shield" style="color: var(--accent-purple); font-size: 1.1rem;"></i>
          <span style="font-weight: 600; font-size: 1rem;">管理面板</span>
        </div>
        <div class="admin-topbar-right">
          <button class="admin-topbar-btn" onclick="closeAdminModal()"><i class="fa fa-times"></i> 关闭</button>
        </div>
      </div>

      <!-- 管理员登录 -->
      <div id="admin-login" class="admin-login-wrap">
        <div class="admin-login-box">
          <div style="text-align: center; margin-bottom: 24px;">
            <i class="fa fa-lock" style="font-size: 2rem; color: var(--accent-purple);"></i>
            <h3 style="margin-top: 12px; color: var(--text-primary);">管理员验证</h3>
            <p style="color: var(--text-muted); font-size: 0.85rem; margin-top: 4px;">请输入管理员密码以继续</p>
          </div>
          <div class="form-group">
            <input type="password" id="admin-password-input" class="form-input" placeholder="请输入管理员密码" onkeydown="if(event.key==='Enter')adminLogin()">
          </div>
          <button class="btn-primary" style="width: 100%;" onclick="adminLogin()">
            <i class="fa fa-sign-in"></i> 登录
          </button>
        </div>
      </div>

      <!-- 管理面板内容 -->
      <div id="admin-dashboard" style="display: none;" class="admin-body">
        <!-- 统计卡片 -->
        <div id="admin-stats" class="admin-stats-row"></div>

        <!-- 工具栏：搜索 + 筛选 + 批量操作 -->
        <div class="admin-toolbar">
          <div class="admin-toolbar-left">
            <div class="admin-search-box">
              <i class="fa fa-search" style="color: var(--text-muted); font-size: 0.8rem;"></i>
              <input type="text" id="admin-search-input" class="admin-search-input" placeholder="搜索帖子内容..." aria-label="管理员搜索" oninput="adminDebounceSearch()">
            </div>
            <select id="admin-filter-select" class="admin-filter-select" onchange="adminCurrentPage=1;loadAdminPostsList()">
              <option value="all">全部帖子</option>
              <option value="active">活跃帖子</option>
              <option value="hidden">已隐藏</option>
              <option value="expired">已过期</option>
            </select>
          </div>
          <div class="admin-toolbar-right">
            <label class="admin-check-label" id="admin-select-all-wrap" style="display:none;">
              <input type="checkbox" id="admin-select-all" onchange="adminToggleSelectAll()">
              <span>全选</span>
            </label>
            <button class="admin-batch-btn" id="admin-batch-delete-btn" style="display:none;" onclick="adminBatchDelete()">
              <i class="fa fa-trash"></i> 批量删除
            </button>
            <button class="admin-batch-btn admin-batch-btn-secondary" id="admin-batch-hide-btn" style="display:none;" onclick="adminBatchToggleHide()">
              <i class="fa fa-eye-slash"></i> 批量隐藏
            </button>
          </div>
        </div>

        <!-- 帖子列表 -->
        <div id="admin-posts-list" class="admin-posts-list">
          <p class="text-center text-muted" style="padding: 40px 0;"><i class="fa fa-spinner fa-spin"></i> 加载中...</p>
        </div>

        <!-- 分页 -->
        <div id="admin-pagination" class="admin-pagination" style="display:none;"></div>

        <!-- 底部退出 -->
        <div style="padding: 16px 0; text-align: center;">
          <button class="btn-secondary" style="padding: 8px 24px;" onclick="adminLogout()"><i class="fa fa-sign-out"></i> 退出管理</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>

  <!-- 悬浮音乐播放器 -->
  <div class="music-player collapsed" id="music-player">
    <!-- 音量浮动提示 -->
    <div class="music-vol-toast" id="music-vol-toast">
      <div class="music-vol-toast-top">
        <i class="music-vol-toast-icon fa fa-volume-up" id="music-vol-toast-icon"></i>
        <div class="music-vol-toast-bar"><div class="music-vol-toast-fill" id="music-vol-toast-fill" style="width:30%"></div></div>
        <span class="music-vol-toast-pct" id="music-vol-toast-pct">30%</span>
      </div>
      <span class="music-vol-toast-arrow" id="music-vol-toast-arrow"><i class="fa fa-arrow-up"></i> 滑动调节</span>
    </div>
    <button class="music-toggle-btn" id="music-toggle" onclick="musicTogglePlay()" aria-label="播放/暂停背景音乐" title="背景音乐">
      <i class="fa fa-music" aria-hidden="true"></i>
    </button>
    <div class="music-player-body">
      <div class="music-visualizer" id="music-visualizer">
        <div class="bar" style="height:4px"></div>
        <div class="bar" style="height:8px"></div>
        <div class="bar" style="height:6px"></div>
        <div class="bar" style="height:10px"></div>
        <div class="bar" style="height:5px"></div>
      </div>
      <div class="music-info">
        <span class="music-title" id="music-title">星夜漫步</span>
        <span class="music-artist" id="music-artist">Ambient</span>
      </div>
      <div class="music-controls">
        <button class="music-ctrl-btn" onclick="musicPrev()" aria-label="上一首" title="上一首"><i class="fa fa-step-backward" aria-hidden="true"></i></button>
        <button class="music-ctrl-btn" onclick="musicNext()" aria-label="下一首" title="下一首"><i class="fa fa-step-forward" aria-hidden="true"></i></button>
        <i class="fa fa-volume-up music-volume-icon" id="music-vol-icon" onclick="musicToggleMute()" role="button" tabindex="0" aria-label="点击静音，上下滑动调节音量" title="点击静音 / 上下滑动调节音量"></i>
      </div>
      <button class="music-collapse-btn" onclick="musicCollapse()" aria-label="收起播放器" title="收起"><i class="fa fa-chevron-left" aria-hidden="true"></i></button>
    </div>
    <span class="drag-hint" id="drag-hint">拖拽移动 · 上下滑调音量</span>
  </div>

  <script src="/js/music.js"></script>
</body>
</html>
